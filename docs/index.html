<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Websiteli Pages</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #141816;
      --muted: #5f6b65;
      --paper: #fbfaf6;
      --line: #d8ded3;
      --green: #236a4b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .site-list {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: inherit;
      text-decoration: none;
      padding: 18px 20px;
      font-weight: 800;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--green);
      color: var(--green);
    }
  </style>
</head>

<body>
  <main>
    <h1>Websiteli Demo Pages</h1>
    <p>Public catalog of static demo company websites.</p>
    <div class="site-list">
      <a href="CHE137391936/">Alpi Gastro</a>
      <a href="CHE174163641/">IO Foundation</a>
      <a href="CHE483115223/">Praxis Mustafa Çiçek</a>
    </div>
  </main>
</body>

</html>
